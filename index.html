<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢铁侠介绍</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
        }
        header {
            background: linear-gradient(90deg, #8b0000, #b22222);
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 36px;
        }
        nav {
            background: #161b22;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #e6edf3;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #f0c420;
        }
        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        .card {
            background: #161b22;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #161b22;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>钢铁侠 Iron Man</h1>
    <p>漫威宇宙中的传奇英雄</p>
</header>

<nav>
    <a href="#intro">简介</a>
    <a href="#story">背景故事</a>
    <a href="#abilities">能力</a>
</nav>

<div class="container">

    <div class="card" id="intro">
        <h2>简介</h2>
        <p>钢铁侠（Iron Man），本名托尼·斯塔克（Tony Stark），是漫威漫画中的超级英雄。他是一位天才发明家、亿万富翁以及斯塔克工业的CEO。</p>
    </div>

    <div class="card" id="story">
        <h2>背景故事</h2>
        <p>托尼·斯塔克在一次武器测试中被俘，为了保命制造了第一套钢铁战甲。从此，他利用自己的科技能力不断升级战甲，成为守护世界的英雄。</p>
    </div>

    <div class="card" id="abilities">
        <h2>能力与装备</h2>
        <ul>
            <li>高科技钢铁战甲</li>
            <li>飞行能力</li>
            <li>强大的武器系统</li>
            <li>人工智能助手（如JARVIS）</li>
        </ul>
    </div>

</div>

<footer>
    <p>© 2026 漫威粉丝页面</p>
</footer>

</body>
</html>
